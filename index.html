<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rejoindre la session</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #1a1a2e;
      color: #fff;
    }
    .card {
      background: #16213e;
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      width: 320px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h1 { font-size: 22px; margin-bottom: 24px; }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #0f3460;
      color: #fff;
      font-size: 16px;
      box-sizing: border-box;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #e94560;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { margin-top: 20px; font-size: 14px; color: #aaa; }
    #counter { margin-top: 12px; font-size: 28px; font-weight: bold; color: #e94560; }
    #counter-label { font-size: 13px; color: #aaa; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎮 Rejoindre</h1>
    <input type="text" id="nameInput" placeholder="Ton nom de joueur" maxlength="32"/>
    <button id="joinBtn" onclick="joinSession()">Rejoindre</button>
    <div id="status"></div>
    <div id="counter"></div>
    <div id="counter-label"></div>
  </div>

  <script>
    // ⬇️ Remplace par l'URL de ta Azure Function
    const FUNCTION_URL = 'https://alertemagma-grd6arbecmc3cqbh.canadacentral-01.azurewebsites.net/api/JoinSession';

    async function joinSession() {
      const name = document.getElementById('nameInput').value.trim();
      if (!name) { setStatus('Entre ton nom !', 'red'); return; }

      const btn = document.getElementById('joinBtn');
      btn.disabled = true;
      setStatus('Connexion...', '#aaa');

      try {
        const res  = await fetch(FUNCTION_URL, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ playerName: name })
        });
        const data = await res.json();

        if (res.ok) {
          setStatus(`✅ Bienvenue, ${data.playerName} !`, '#4caf50');
          document.getElementById('counter').textContent = data.count;
          document.getElementById('counter-label').textContent = 'joueur(s) connecté(s)';
        } else {
          setStatus('❌ Erreur : ' + data, 'red');
          btn.disabled = false;
        }
      } catch (err) {
        setStatus('❌ Impossible de joindre le serveur', 'red');
        btn.disabled = false;
      }
    }

    function setStatus(msg, color) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.style.color = color;
    }
  </script>
</body>
</html>
