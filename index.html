<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Alerte Magma</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: -apple-system, sans-serif; min-height: 100vh; }

    /* JOIN */
    #screen-join { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px 24px; gap: 14px; max-width: 400px; margin: 0 auto; }
    #screen-join h1 { font-size: 28px; font-weight: 700; color: #5dcaa5; }
    #screen-join p { font-size: 13px; color: #555; text-align: center; }
    .input-label { font-size: 11px; color: #555; letter-spacing: 0.08em; align-self: flex-start; }
    .game-input { background: #0f3460; border: 1px solid #1d4a8a; border-radius: 12px; padding: 14px 16px; font-size: 16px; color: #fff; width: 100%; outline: none; transition: border-color 0.2s; }
    .game-input:focus { border-color: #5dcaa5; }
    .game-input::placeholder { color: #444; }
    #join-btn { background: #1D9E75; border: none; border-radius: 12px; padding: 16px; width: 100%; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 4px; }
    #join-btn:active { opacity: 0.8; }
    #join-btn:disabled { opacity: 0.4; }
    #join-status { font-size: 12px; color: #888; text-align: center; min-height: 18px; }

    /* WAITING */
    #screen-waiting { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px 24px; gap: 16px; max-width: 400px; margin: 0 auto; text-align: center; }
    #screen-waiting h2 { font-size: 20px; font-weight: 600; color: #5dcaa5; }
    .spinner { width: 40px; height: 40px; border: 3px solid #1d4a8a; border-top-color: #5dcaa5; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .waiting-players { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .waiting-pip { width: 12px; height: 12px; border-radius: 50%; background: #1d4a8a; transition: background 0.3s; }
    .waiting-pip.joined { background: #5dcaa5; }
    #waiting-status { font-size: 12px; color: #555; }

    /* GAME */
    #screen-game { display: none; padding: 20px 18px; max-width: 400px; margin: 0 auto; }
    .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .room-pill { background: #0f3460; color: #5dcaa5; font-size: 11px; font-weight: 600; padding: 6px 10px; border-radius: 20px; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .player-pill { background: #0f3460; color: #AFA9EC; font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 20px; }
    .players-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .player-badge { font-size: 10px; padding: 3px 8px; border-radius: 20px; background: #0f3460; color: #888; }
    .player-badge.me { color: #5dcaa5; border: 1px solid #1D9E75; }
    .mana-row { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; }
    .mana-pip { width: 15px; height: 15px; border-radius: 50%; background: #1d4a8a; transition: background 0.3s; }
    .mana-pip.full { background: #7F77DD; }
    .mana-label { font-size: 11px; color: #555; margin-left: 4px; }
    .turn-box { border-radius: 10px; padding: 10px 14px; font-size: 12px; color: #888; text-align: center; margin-bottom: 14px; background: #0f3460; transition: all 0.3s; }
    .turn-box.your-turn { background: #0a2a1a; color: #5dcaa5; font-weight: 600; }
    .hand-label { font-size: 10px; color: #444; letter-spacing: 0.1em; margin-bottom: 10px; }
    .cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
    .card { background: #0f3460; border: 1.5px solid #1d4a8a; border-radius: 12px; padding: 12px 6px; text-align: center; cursor: pointer; transition: transform 0.15s, border-color 0.15s; user-select: none; }
    .card.selected { border-color: #5dcaa5; background: #0a2a3a; transform: translateY(-4px); }
    .card.played { opacity: 0.2; pointer-events: none; }
    .card.cant-afford { opacity: 0.35; }
    .card-icon { font-size: 20px; margin-bottom: 5px; }
    .card-name { font-size: 11px; font-weight: 600; color: #ddd; margin-bottom: 2px; }
    .card-stat { font-size: 10px; color: #666; }
    .card-cost { font-size: 9px; background: #1d4a8a; color: #AFA9EC; border-radius: 8px; padding: 2px 6px; display: inline-block; margin-top: 3px; }
    #play-btn { background: #1D9E75; border: none; border-radius: 12px; padding: 15px; width: 100%; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; opacity: 0.35; transition: opacity 0.2s; margin-bottom: 10px; }
    #play-btn.ready { opacity: 1; }
    #play-btn:active { transform: scale(0.98); }
    .toast { background: #1D9E75; color: #fff; font-size: 13px; text-align: center; padding: 10px; border-radius: 10px; margin-bottom: 10px; display: none; }
    .toast.show { display: block; }
    .log { background: #0f3460; border-radius: 10px; padding: 10px 12px; font-size: 11px; color: #555; line-height: 1.8; }
    .log span { color: #5dcaa5; }
  </style>
</head>
<body>

<!-- JOIN -->
<div id="screen-join">
  <h1>Alerte Magma</h1>
  <p>Entre ton nom pour rejoindre une partie</p>
  <span class="input-label">TON NOM</span>
  <input class="game-input" id="name-input" placeholder="ex: Alex" maxlength="16" oninput="checkReady()">
  <button id="join-btn" onclick="joinMatchmaking()" disabled>Trouver une partie</button>
  <div id="join-status"></div>
</div>

<!-- WAITING -->
<div id="screen-waiting">
  <h2>En attente de joueurs...</h2>
  <div class="spinner"></div>
  <div class="waiting-players" id="waiting-pips">
    <div class="waiting-pip joined"></div>
    <div class="waiting-pip"></div>
    <div class="waiting-pip"></div>
    <div class="waiting-pip"></div>
  </div>
  <div id="waiting-status">1 / 4 joueurs connectés</div>
  <button id="start-btn" onclick="forceStart()" style="display:none; background:#1D9E75; border:none; border-radius:12px; padding:14px 24px; color:#fff; font-size:15px; font-weight:600; cursor:pointer; margin-top:8px;">Tout le monde est là!</button>
  <div style="font-size:11px; color:#444;" id="start-hint"></div>
</div>

<!-- GAME -->
<div id="screen-game">
  <div class="game-header">
    <div class="room-pill" id="room-label">Match</div>
    <div class="player-pill" id="player-label">...</div>
  </div>
  <div class="players-row" id="players-row"></div>
  <div class="mana-row">
    <div class="mana-pip full"></div>
    <div class="mana-pip full"></div>
    <div class="mana-pip full"></div>
    <div class="mana-pip"></div>
    <div class="mana-pip"></div>
    <span class="mana-label" id="mana-label">3 / 5 mana</span>
  </div>
  <div class="turn-box your-turn" id="turn-box">C'est ton tour! Choisis une carte.</div>
  <div class="hand-label">TA MAIN</div>
  <div class="cards-grid" id="cards-grid"></div>
  <div class="toast" id="toast">Carte envoyée à Unity!</div>
  <button id="play-btn" onclick="playCard()">Choisis une carte</button>
  <div class="log" id="log">En attente...</div>
</div>

<script>
  const TITLE_ID  = "7F2D7";
  const BASE      = "https://7F2D7.playfabapi.com";
  const QUEUE     = "alertemagma_game";

  const CARDS = [
    { id: "fire_bolt",  name: "Fire Bolt",  icon: "🔥", stat: "35 dmg",  cost: 2 },
    { id: "shield",     name: "Shield",     icon: "🛡",  stat: "+20 def", cost: 1 },
    { id: "heal",       name: "Heal",       icon: "💚", stat: "+25 hp",  cost: 2 },
    { id: "ice_spike",  name: "Ice Spike",  icon: "❄️",  stat: "20 dmg",  cost: 1 },
    { id: "bomb",       name: "Bomb",       icon: "💣", stat: "50 dmg",  cost: 3 },
    { id: "lightning",  name: "Lightning",  icon: "⚡", stat: "40 dmg",  cost: 3 },
  ];

  let playerName    = "";
  let sessionTicket = "";
  let entityToken   = "";
  let entityId      = "";
  let playFabId     = "";
  let ticketId      = "";
  let matchId       = "";
  let selectedCard  = -1;
  let myTurn        = true;
  let mana          = 3;
  let playedCards   = [];
  let lastAction    = "";
  let pollTimer     = null;

  // ---- REST helper ----
  async function pf(endpoint, body, useEntity) {
    const headers = { "Content-Type": "application/json" };
    if (useEntity === "entity") headers["X-EntityToken"] = entityToken;
    else if (useEntity === "session") headers["X-Authorization"] = sessionTicket;
    const res  = await fetch(BASE + endpoint, { method: "POST", headers, body: JSON.stringify(body) });
    const json = await res.json();
    if (json.code !== 200) throw new Error(json.errorMessage || json.error || "Erreur PlayFab");
    return json.data;
  }

  // ---- UI helpers ----
  function checkReady() {
    const v = document.getElementById("name-input").value.trim();
    document.getElementById("join-btn").disabled = v.length < 2;
  }
  function setStatus(msg) { document.getElementById("join-status").textContent = msg; }
  function log(msg) { document.getElementById("log").innerHTML = msg; }
  function show(id) {
    ["screen-join","screen-waiting","screen-game"].forEach(s => {
      document.getElementById(s).style.display = s === id ? (id === "screen-waiting" ? "flex" : "block") : "none";
    });
  }
  function getDeviceId() {
    let id = localStorage.getItem("am_id");
    if (!id) { id = "web_" + Math.random().toString(36).substr(2, 12); localStorage.setItem("am_id", id); }
    return id;
  }

// ---- 1. LOGIN ----
  async function joinMatchmaking() {
    playerName = document.getElementById("name-input").value.trim();
    document.getElementById("join-btn").disabled = true;
    setStatus("Connexion à PlayFab...");

    try {
      const login = await pf("/Client/LoginWithCustomID", {
        CustomId: getDeviceId(),
        CreateAccount: true,
        TitleId: TITLE_ID,
        InfoRequestParameters: { GetEntityToken: true }
      });

      sessionTicket = login.SessionTicket;
      playFabId     = login.PlayFabId;
      entityToken   = login.EntityToken.EntityToken;
      entityId      = login.EntityToken.Entity.Id;

      setStatus("Connecté! Nettoyage des anciens tickets...");

      // Annule tous les tickets existants avant d'en créer un nouveau
      await cancelExistingTickets();
      await createTicket();

    } catch(e) {
      setStatus("Erreur: " + e.message);
      document.getElementById("join-btn").disabled = false;
    }
  }

  // ---- ANNULE LES VIEUX TICKETS ----
  async function cancelExistingTickets() {
    try {
      const result = await pf("/Match/ListMatchmakingTicketsForPlayer", {
        QueueName: QUEUE,
        Entity: { Id: entityId, Type: "title_player_account" }
      }, "entity");

      if (result.TicketIds && result.TicketIds.length > 0) {
        for (const id of result.TicketIds) {
          try {
            await pf("/Match/CancelMatchmakingTicket", {
              QueueName: QUEUE,
              TicketId: id
            }, "entity");
          } catch(e) {}
        }
      }
    } catch(e) {}
  }

  // ---- 2. CRÉER TICKET MATCHMAKING ----
  async function createTicket() {
    const data = await pf("/Match/CreateMatchmakingTicket", {
      QueueName: QUEUE,
      Creator: {
        Entity: { Id: entityId, Type: "title_player_account" },
        Attributes: { DataObject: { name: playerName } }
      },
      GiveUpAfterSeconds: 120
    }, "entity");

    ticketId = data.TicketId;
    show("screen-waiting");
    pollTicket();
  }

  // ---- 3. POLL TICKET ----
  function pollTicket() {
    let count = 0;
    pollTimer = setInterval(async () => {
      try {
        const data = await pf("/Match/GetMatchmakingTicket", {
          QueueName: QUEUE,
          TicketId: ticketId,
          EscapeObject: false
        }, "entity");

        const status  = data.Status;
        const members = data.Members ? data.Members.length : 1;

        // Update pips
        const pips = document.querySelectorAll(".waiting-pip");
        pips.forEach((p, i) => p.classList.toggle("joined", i < members));
        document.getElementById("waiting-status").textContent = members + " / 4 joueurs connectés";

        // Affiche le bouton dès que 2+ joueurs sont là
        if (members >= 2) {
          document.getElementById("start-btn").style.display = "block";
          document.getElementById("start-hint").textContent  = "ou attends que 4 joueurs rejoignent";
        }

        if (status === "Matched") {
          clearInterval(pollTimer);
          matchId = data.MatchId;
          await startGame(data.Members);
        } else if (status === "Canceled") {
          clearInterval(pollTimer);
          show("screen-join");
          setStatus("Recherche annulée. Réessaie.");
        }

      } catch(e) {
        count++;
        if (count > 10) { clearInterval(pollTimer); show("screen-join"); setStatus("Erreur réseau."); }
      }
    }, 2000);
  }

  // ---- FORCE START ----
  async function forceStart() {
    clearInterval(pollTimer);
    document.getElementById("start-btn").style.display   = "none";
    document.getElementById("waiting-status").textContent = "Démarrage...";

    try {
      // Annule le ticket et démarre le jeu avec le ticketId comme matchId
      await pf("/Match/CancelMatchmakingTicket", {
        QueueName: QUEUE,
        TicketId: ticketId
      }, "entity");
    } catch(e) {}

    // Utilise le ticketId comme room ID partagé
    matchId = "room_" + ticketId.slice(-8);
    await startGame(null);
  }

  // ---- 4. MATCH TROUVÉ ----
  async function startGame(members) {
    show("screen-game");
    document.getElementById("player-label").textContent = playerName;
    document.getElementById("room-label").textContent   = "Match " + matchId.slice(-6);

    // Affiche les joueurs
    const row = document.getElementById("players-row");
    row.innerHTML = "";
    if (members) {
      members.forEach(m => {
        const name = m.Attributes?.DataObject?.name || m.Entity.Id.slice(-4);
        const b = document.createElement("div");
        b.className = "player-badge" + (m.Entity.Id === entityId ? " me" : "");
        b.textContent = name;
        row.appendChild(b);
      });
    }

    renderCards();
    updateMana();
    startGamePolling();
    log("Match trouvé! Bienvenue <span>" + playerName + "</span>");
  }

  // ---- CARTES ----
  function renderCards() {
    const grid = document.getElementById("cards-grid");
    grid.innerHTML = "";
    CARDS.forEach((card, i) => {
      const d = document.createElement("div");
      let cls = "card";
      if (playedCards.includes(i)) cls += " played";
      else if (card.cost > mana)   cls += " cant-afford";
      d.className = cls;
      d.id = "card-" + i;
      d.innerHTML = `<div class="card-icon">${card.icon}</div>
        <div class="card-name">${card.name}</div>
        <div class="card-stat">${card.stat}</div>
        <div class="card-cost">${card.cost} mana</div>`;
      d.onclick = () => selectCard(i);
      grid.appendChild(d);
    });
  }

  function selectCard(i) {
    if (!myTurn || playedCards.includes(i) || CARDS[i].cost > mana) return;
    document.querySelectorAll(".card").forEach(c => c.classList.remove("selected"));
    document.getElementById("card-" + i).classList.add("selected");
    selectedCard = i;
    const btn = document.getElementById("play-btn");
    btn.textContent = "Jouer " + CARDS[i].name;
    btn.classList.add("ready");
  }

  async function playCard() {
    if (selectedCard === -1 || !myTurn) return;
    const card = CARDS[selectedCard];

    try {
      await pf("/Client/UpdateSharedGroupData", {
        SharedGroupId: matchId,
        Data: {
          lastAction: JSON.stringify({
            playerName, entityId,
            cardId:    card.id,
            cardIndex: selectedCard,
            cardName:  card.name,
            timestamp: Date.now()
          })
        }
      }, "session");

      playedCards.push(selectedCard);
      mana -= card.cost;
      updateMana();
      renderCards();
      document.getElementById("toast").classList.add("show");
      setTimeout(() => document.getElementById("toast").classList.remove("show"), 2000);
      document.getElementById("turn-box").className   = "turn-box";
      document.getElementById("turn-box").textContent = "Carte envoyée! En attente...";
      document.getElementById("play-btn").textContent = "Choisis une carte";
      document.getElementById("play-btn").classList.remove("ready");
      log("<span>" + playerName + "</span> joue <span>" + card.name + "</span>");
      selectedCard = -1;
      myTurn = false;

    } catch(e) { log("Erreur: " + e.message); }
  }

  // ---- POLL GAME (actions des autres joueurs) ----
  function startGamePolling() {
    setInterval(async () => {
      try {
        const result = await pf("/Client/GetSharedGroupData", {
          SharedGroupId: matchId
        }, "session");

        const data = result.Data;
        if (!data) return;

        if (data.lastAction) {
          const action = data.lastAction.Value;
          if (action !== lastAction) {
            lastAction = action;
            try {
              const a = JSON.parse(action);
              if (a.entityId !== entityId) {
                log("<span>" + a.playerName + "</span> joue <span>" + a.cardName + "</span>");
              }
            } catch(e) {}
          }
        }

        if (data.currentTurn) {
          const turn = data.currentTurn.Value;
          if (turn === playerName && !myTurn) {
            myTurn = true;
            document.getElementById("turn-box").className   = "turn-box your-turn";
            document.getElementById("turn-box").textContent = "C'est ton tour! Choisis une carte.";
          } else if (turn !== playerName) {
            myTurn = false;
            document.getElementById("turn-box").className   = "turn-box";
            document.getElementById("turn-box").textContent = "Tour de " + turn + "...";
          }
        }
      } catch(e) {}
    }, 1500);
  }

  function updateMana() {
    document.querySelectorAll(".mana-pip").forEach((pip, i) => pip.classList.toggle("full", i < mana));
    document.getElementById("mana-label").textContent = mana + " / 5 mana";
  }
</script>
</body>
</html>
