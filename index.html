<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Alerte Magma</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: -apple-system, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 360px; padding: 32px 24px; }
    h1 { font-size: 26px; font-weight: 700; color: #5dcaa5; text-align: center; margin-bottom: 4px; }
    .input-label { font-size: 11px; color: #555; letter-spacing: 0.08em; }
    input { background: #0f3460; border: 1px solid #1d4a8a; border-radius: 12px; padding: 14px 16px; font-size: 16px; color: #fff; width: 100%; outline: none; }
    input:focus { border-color: #5dcaa5; }
    input::placeholder { color: #444; }
    .code { letter-spacing: 6px; text-transform: uppercase; font-size: 20px; text-align: center; }
    button { background: #1D9E75; border: none; border-radius: 12px; padding: 15px; width: 100%; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 4px; }
    button:disabled { opacity: 0.4; }
    button:active { opacity: 0.85; }
    .status { font-size: 12px; color: #888; text-align: center; min-height: 18px; }
    .success { color: #5dcaa5; font-size: 14px; text-align: center; font-weight: 500; }
  </style>
</head>
<body>
<div class="container">
  <h1>Alerte Magma</h1>

  <span class="input-label">TON NOM</span>
  <input id="name" placeholder="ex: Alex" maxlength="16" oninput="check()">

  <span class="input-label">ROOM ID</span>
  <input id="code" class="code" placeholder="XXXX" maxlength="4" oninput="check()">

  <button id="btn" onclick="join()" disabled>Rejoindre</button>
  <div class="status" id="status"></div>
</div>

<script>
  const TITLE_ID = "7F2D7";
  const BASE     = "https://7F2D7.playfabapi.com";
  let sessionTicket = "";
  let playFabId     = "";

  async function pf(endpoint, body, auth) {
    const headers = { "Content-Type": "application/json" };
    if (auth) headers["X-Authorization"] = sessionTicket;
    const res  = await fetch(BASE + endpoint, { method: "POST", headers, body: JSON.stringify(body) });
    const json = await res.json();
    if (json.code !== 200) throw new Error(json.errorMessage || "Erreur PlayFab");
    return json.data;
  }

  function check() {
    const ok = document.getElementById("name").value.trim().length >= 2
            && document.getElementById("code").value.trim().length === 4;
    document.getElementById("btn").disabled = !ok;
  }

  function getDeviceId() {
    let id = localStorage.getItem("am_id");
    if (!id) { id = "web_" + Math.random().toString(36).substr(2, 12); localStorage.setItem("am_id", id); }
    return id;
  }

  function setStatus(msg) { document.getElementById("status").textContent = msg; }

  async function join() {
    const name = document.getElementById("name").value.trim();
    const code = document.getElementById("code").value.trim().toUpperCase();
    document.getElementById("btn").disabled = true;
    setStatus("Connexion...");

    try {
      // Login
      const login = await pf("/Client/LoginWithCustomID", {
        CustomId: getDeviceId(), CreateAccount: true, TitleId: TITLE_ID
      });
      sessionTicket = login.SessionTicket;
      playFabId     = login.PlayFabId;

      // Rejoindre le groupe
      try {
        await pf("/Client/AddSharedGroupMembers", {
          SharedGroupId: code, PlayFabIds: [playFabId]
        }, true);
      } catch(e) {}

      // Écrire son nom dans la room
      await pf("/Client/UpdateSharedGroupData", {
        SharedGroupId: code,
        Data: {
          ["player_" + playFabId]: JSON.stringify({ name, joinedAt: Date.now() })
        }
      }, true);

      setStatus("");
      document.querySelector(".container").innerHTML =
        `<h1>Alerte Magma</h1>
         <div class="success">Connecté à la room<br><strong>${code}</strong></div>
         <div class="status">En attente du début de la partie...</div>`;

    } catch(e) {
      setStatus("Erreur: " + e.message);
      document.getElementById("btn").disabled = false;
    }
  }
</script>
</body>
</html>
