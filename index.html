<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeu de cartes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d1a;
      --surface:   #13132b;
      --surface2:  #1c1c3a;
      --accent:    #e94560;
      --accent2:   #f5a623;
      --text:      #e8e6f0;
      --muted:     #7b7a9a;
      --border:    rgba(255,255,255,0.08);
      --radius:    14px;
      --card-w:    88px;
      --card-h:    130px;
    }

    body {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      /* subtle grid texture */
      background-image:
        linear-gradient(rgba(233,69,96,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(233,69,96,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ─── ÉCRAN LOGIN ─────────────────────────────────────── */
    #login-screen {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 36px;
      text-align: center;
      width: 320px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(233,69,96,0.1);
      animation: fadeUp .5s ease;
    }
    #login-screen .logo {
      font-family: 'Cinzel', serif;
      font-size: 26px;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #e94560, #f5a623);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #login-screen .sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }
    #login-screen input {
      width: 100%;
      padding: 13px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 15px;
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      margin-bottom: 14px;
      outline: none;
      transition: border-color .2s;
    }
    #login-screen input:focus { border-color: rgba(233,69,96,0.5); }
    #login-screen input::placeholder { color: var(--muted); }
    #login-screen button {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, background .2s;
      box-shadow: 0 4px 20px rgba(233,69,96,0.35);
    }
    #login-screen button:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(233,69,96,0.5); }
    #login-screen button:active { transform: translateY(0); }
    #login-msg {
      margin-top: 14px;
      font-size: 13px;
      min-height: 18px;
      color: var(--muted);
    }

    /* ─── ÉCRAN ATTENTE ───────────────────────────────────── */
    #wait-screen {
      display: none;
      text-align: center;
      animation: fadeUp .5s ease;
    }
    #wait-screen h1 {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 28px;
    }
    #player-count {
      font-family: 'Cinzel', serif;
      font-size: 72px;
      font-weight: 600;
      line-height: 1;
      background: linear-gradient(135deg, #e94560, #f5a623);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    #wait-screen .count-label {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 24px;
    }

    /* ─── BANNIÈRE DÉBUT ──────────────────────────────────── */
    .game-banner {
      display: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      padding: 10px 22px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 24px;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.85;transform:scale(.98)} }

    /* ─── ÉCRAN JEU ───────────────────────────────────────── */
    #game-screen {
      display: none;
      width: 100%;
      max-width: 580px;
      text-align: center;
      animation: fadeUp .5s ease;
    }
    #game-screen h1 {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* ─── MAIN DE CARTES ──────────────────────────────────── */
    #hand {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ─── CARTE ───────────────────────────────────────────── */
    .card {
      width: var(--card-w);
      height: var(--card-h);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: flex-end;
      cursor: pointer;
      border: 1.5px solid rgba(255,255,255,0.15);
      transition: transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s ease;
      user-select: none;
      overflow: hidden;
      position: relative;
    }
    .card:hover {
      transform: translateY(-14px) scale(1.04);
      box-shadow: 0 20px 48px rgba(0,0,0,0.6), 0 0 0 1.5px rgba(255,255,255,0.2);
      z-index: 10;
    }
    .card:active { transform: translateY(-4px) scale(1.01); }

    /* Image de carte */
    .card-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: calc(var(--radius) - 1px);
      transition: opacity .3s;
    }

    /* Overlay dégradé pour lisibilité du label */
    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.1) 50%, transparent 100%);
      border-radius: calc(var(--radius) - 1px);
      pointer-events: none;
    }

    /* Identifiant en haut à gauche */
    .card-id {
      position: absolute;
      top: 7px;
      left: 9px;
      font-family: 'Cinzel', serif;
      font-size: 18px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
      z-index: 2;
      line-height: 1;
    }

    /* Nom de la carte en bas */
    .card-name {
      position: relative;
      z-index: 2;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.9);
      padding: 0 6px 7px 6px;
      text-align: right;
      line-height: 1.3;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }

    /* Indicateur couleur (coin haut droit quand pas d'image) */
    .card-dot {
      position: absolute;
      top: 7px;
      right: 7px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      z-index: 2;
      opacity: 0.85;
      box-shadow: 0 0 6px currentColor;
    }

    /* ─── DERNIÈRE CARTE JOUÉE ────────────────────────────── */
    #last-played {
      margin-top: 22px;
      font-size: 13px;
      color: var(--muted);
      min-height: 20px;
      transition: opacity .3s;
    }
    #last-played b { color: var(--text); }
    #last-played .played-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }

    /* ─── MESSAGES ────────────────────────────────────────── */
    .msg {
      margin-top: 14px;
      font-size: 13px;
      min-height: 20px;
      transition: opacity .3s;
    }

    /* ─── ANIMATIONS ──────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes cardDeal {
      from { opacity: 0; transform: translateY(30px) scale(.9); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card { animation: cardDeal .35s cubic-bezier(.34,1.56,.64,1) both; }

    /* ─── JOUER CONFIRMATION ──────────────────────────────── */
    .card.played {
      animation: playOut .3s ease forwards;
    }
    @keyframes playOut {
      to { opacity: 0; transform: translateY(-40px) scale(.85); }
    }
  </style>
</head>
<body>

  <!-- ═══ LOGIN ═════════════════════════════════════════════ -->
  <div id="login-screen">
    <div class="logo">MAGMA</div>
    <div class="sub">Jeu de cartes élémentaires</div>
    <input type="text" id="nameInput" placeholder="Ton nom" maxlength="32" autocomplete="off"/>
    <button onclick="joinSession()">Rejoindre la partie</button>
    <div class="msg" id="login-msg"></div>
  </div>

  <!-- ═══ ATTENTE ════════════════════════════════════════════ -->
  <div id="wait-screen">
    <h1>⏳ En attente de joueurs</h1>
    <div id="player-count">0</div>
    <div class="count-label">joueur(s) connecté(s)</div>
    <div class="game-banner" id="wait-banner">🚀 La partie commence !</div>
    <div class="msg" id="wait-msg"></div>
  </div>

  <!-- ═══ JEU ════════════════════════════════════════════════ -->
  <div id="game-screen">
    <div class="game-banner" id="game-banner">🚀 La partie commence !</div>
    <h1>✦ Ta main</h1>
    <div id="hand"></div>
    <div id="last-played"></div>
    <div class="msg" id="game-msg"></div>
  </div>

<script>
  /* ─── CONFIG ────────────────────────────────────────────── */
  const FUNCTION_URL = 'https://alertemagma-grd6arbecmc3cqbh.canadacentral-01.azurewebsites.net/api/JoinSession';
  const MEDIAS_PATH  = './medias/';   // dossier des images
  const IMG_EXT      = '.jpg';        // extension (.png ou .svg)

  const CARD_TYPES = [
    { id: 1,  nom: "lave_3_verticale",   couleur: "#e74c3c" },
    { id: 2,  nom: "lave_3_horizontale", couleur: "#c0392b" },
    { id: 3,  nom: "lave_4",             couleur: "#a93226" },
    { id: 4,  nom: "eau_3_verticale",    couleur: "#3498db" },
    { id: 5,  nom: "eau_3_horizontale",  couleur: "#2980b9" },
    { id: 6,  nom: "eau_4",              couleur: "#1a6fa0" },
    { id: 7,  nom: "bloque_2",           couleur: "#7f8c8d" },
    { id: 8,  nom: "bloque_2empty",      couleur: "#95a5a6" },
    { id: 9,  nom: "vent_nord",          couleur: "#2ecc71" },
    { id: 10, nom: "vent_sud",           couleur: "#27ae60" },
    { id: 11, nom: "vent_est",           couleur: "#1e8449" },
    { id: 12, nom: "vent_west",          couleur: "#145a32" }
  ];

  /* ─── ÉTAT ─────────────────────────────────────────────── */
  let myName      = '';
  let myPlayfabId = '';
  let myHand      = [];
  let gameStarted = false;
  let lastCardUid = '';
  let pollTimer   = null;

  /* ─── AUTO-RECONNEXION ──────────────────────────────────── */
  window.onload = async function () {
    const savedName      = localStorage.getItem('playerName');
    const savedPlayfabId = localStorage.getItem('playfabId');

    if (savedName && savedPlayfabId) {
      try {
        const res  = await fetch(FUNCTION_URL);
        const data = await res.json();

        if (data.gameState !== 'waiting') {
          myName      = savedName;
          myPlayfabId = savedPlayfabId;
          hide('login-screen');
          hide('wait-screen');
          showGameMsg(`♻️ Reconnecté en tant que ${myName}`, '#4caf50');
          gameStarted = true;
          startGame(data);
          startPolling();
        } else {
          localStorage.removeItem('playerName');
          localStorage.removeItem('playfabId');
          document.getElementById('nameInput').value = savedName;
        }
      } catch (e) {
        if (savedName) document.getElementById('nameInput').value = savedName;
      }
    }
  };

  /* ─── REJOINDRE ─────────────────────────────────────────── */
  async function joinSession() {
    const name = document.getElementById('nameInput').value.trim();
    if (!name) { showLoginMsg('Entre ton nom !', '#e94560'); return; }
    myName = name;
    showLoginMsg('Connexion…', '#7b7a9a');

    try {
      const res  = await fetch(FUNCTION_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ playerName: name })
      });
      const data = await res.json();

      if (res.ok) {
        myPlayfabId = data.playfabId;
        localStorage.setItem('playerName', myName);
        localStorage.setItem('playfabId',  myPlayfabId);

        hide('login-screen');
        show('wait-screen');
        document.getElementById('player-count').textContent = data.count;
        startPolling();
      } else {
        showLoginMsg('Erreur : ' + JSON.stringify(data), '#e94560');
      }
    } catch (err) {
      showLoginMsg('Impossible de joindre le serveur', '#e94560');
    }
  }

  /* ─── POLLING ───────────────────────────────────────────── */
  function startPolling() {
    pollState();
    pollTimer = setInterval(pollState, 3000);
  }

  async function pollState() {
    try {
      const res  = await fetch(FUNCTION_URL);
      const data = await res.json();

      document.getElementById('player-count').textContent = data.count;

      if (data.gameState === 'started' && !gameStarted) {
        gameStarted = true;
        startGame(data);
      }

      if (data.gameState === 'waiting' && gameStarted) {
        localStorage.removeItem('playerName');
        localStorage.removeItem('playfabId');
        location.reload();
      }

      if (data.lastPlayedCard?.card) {
        const lp  = data.lastPlayedCard;
        const uid = lp.card.uid;
        if (uid !== lastCardUid) {
          lastCardUid = uid;
          const el = document.getElementById('last-played');
          el.innerHTML = `
            <span class="played-dot" style="background:${lp.card.couleur}"></span>
            <b>${lp.playerName}</b> a joué <b>${lp.card.nom.replace(/_/g,' ')}</b>`;
        }
      }
    } catch (e) {}
  }

  /* ─── DÉBUT DE PARTIE ───────────────────────────────────── */
  function startGame(data) {
    hide('wait-screen');
    show('game-screen');
    show('game-banner', 'flex');
    setTimeout(() => hide('game-banner'), 4000);

    const me = data.players?.find(p => p.playfabId === myPlayfabId);
    myHand = (me?.hand?.length) ? me.hand : drawLocalCards(5);
    renderHand();
  }

  /* ─── AFFICHER LA MAIN ──────────────────────────────────── */
  function renderHand() {
    const handDiv = document.getElementById('hand');
    handDiv.innerHTML = '';

    myHand.forEach((card, i) => {
      const div = document.createElement('div');
      div.className = 'card';
      div.style.background = card.couleur;
      div.style.animationDelay = `${i * 0.06}s`;

      /* Image depuis ./medias/ */
      const img = document.createElement('img');
      img.className = 'card-img';
      img.src = `${MEDIAS_PATH}${card.nom}${IMG_EXT}`;
      img.alt = card.nom;
      img.draggable = false;
      img.onerror  = () => { img.style.display = 'none'; }; // fallback couleur

      /* Overlay gradient */
      const overlay = document.createElement('div');
      overlay.className = 'card-overlay';

      /* Identifiant numérique */
      const idEl = document.createElement('div');
      idEl.className = 'card-id';
      idEl.textContent = card.id;

      /* Point couleur (visible si pas d'image) */
      const dot = document.createElement('div');
      dot.className = 'card-dot';
      dot.style.background = card.couleur;

      /* Nom */
      const nameEl = document.createElement('div');
      nameEl.className = 'card-name';
      nameEl.textContent = card.nom.replace(/_/g, ' ');

      div.appendChild(img);
      div.appendChild(overlay);
      div.appendChild(idEl);
      div.appendChild(dot);
      div.appendChild(nameEl);

      div.onclick = () => playCard(card.uid, div);
      handDiv.appendChild(div);
    });
  }

  /* ─── JOUER UNE CARTE ───────────────────────────────────── */
  async function playCard(cardUid, el) {
    if (el) {
      el.classList.add('played');
      el.onclick = null;
    }
    try {
      const res  = await fetch(FUNCTION_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ action: 'playCard', cardUid, playfabId: myPlayfabId })
      });
      const data = await res.json();

      if (res.ok) {
        myHand = data.hand;
        setTimeout(() => {
          renderHand();
          showGameMsg(`✅ ${data.playedCard.nom.replace(/_/g,' ')} jouée !`, '#4caf50');
          setTimeout(() => showGameMsg('', ''), 2200);
        }, 300);
      } else {
        showGameMsg('Erreur : ' + JSON.stringify(data), '#e94560');
        if (el) { el.classList.remove('played'); el.onclick = () => playCard(cardUid, el); }
      }
    } catch (err) {
      showGameMsg('Erreur réseau', '#e94560');
      if (el) { el.classList.remove('played'); el.onclick = () => playCard(cardUid, el); }
    }
  }

  /* ─── TIRAGE LOCAL (fallback) ───────────────────────────── */
  function drawLocalCards(count) {
    return Array.from({ length: count }, () => {
      const card = CARD_TYPES[Math.floor(Math.random() * CARD_TYPES.length)];
      return { ...card, uid: Math.random().toString(36).substr(2, 9) };
    });
  }

  /* ─── HELPERS UI ────────────────────────────────────────── */
  function show(id, display = 'block') {
    const el = document.getElementById(id);
    if (el) el.style.display = display;
  }
  function hide(id) {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  }
  function showLoginMsg(msg, color) {
    const el = document.getElementById('login-msg');
    if (el) { el.textContent = msg; el.style.color = color; }
  }
  function showGameMsg(msg, color) {
    const el = document.getElementById('game-msg');
    if (el) { el.textContent = msg; el.style.color = color; }
  }
</script>
</body>
</html>
