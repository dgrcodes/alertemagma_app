<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeu de cartes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══ LOGIN ═════════════════════════════════════════════ -->
  <div id="login-screen">
    <div class="logo">MAGMA</div>
    <div class="sub">Jeu de cartes élémentaires</div>
    <input type="text" id="nameInput" placeholder="Ton nom" maxlength="32" autocomplete="off"/>
    <button onclick="joinSession()">Rejoindre la partie</button>
    <div class="msg" id="login-msg"></div>
  </div>

  <!-- ═══ ATTENTE ════════════════════════════════════════════ -->
  <div id="wait-screen">
    <h1>⏳ En attente de joueurs</h1>
    <div id="player-count">0</div>
    <div class="count-label">joueur(s) connecté(s)</div>
    <div class="game-banner" id="wait-banner">🚀 La partie commence !</div>
    <div class="msg" id="wait-msg"></div>
  </div>

  <!-- ═══ JEU ════════════════════════════════════════════════ -->
  <div id="game-screen">

    <!-- Haut : info & messages -->
    <div class="game-top">
      <div class="game-banner" id="game-banner">🚀 La partie commence !</div>
      <div id="last-played"></div>
      <div class="msg" id="game-msg"></div>
    </div>

    <!-- Milieu : zone de dépôt + bouton jouer -->
    <div class="play-area">
      <div id="play-zone">
        <div class="zone-hint">Glisse une carte ici<br>pour la jouer</div>
      </div>
      <button id="confirm-btn" onclick="confirmPlay()">Jouer la carte</button>
    </div>

    <!-- Bas : main de cartes -->
    <div class="hand-area">
      <div class="hand-label">✦ Ta main</div>
      <div id="hand"></div>
    </div>

  </div>

<script>
  /* ─── CONFIG ────────────────────────────────────────────── */
  const FUNCTION_URL = 'https://alertemagma-grd6arbecmc3cqbh.canadacentral-01.azurewebsites.net/api/JoinSession';
  const MEDIAS_PATH  = './medias/';
  const IMG_EXT      = '.jpg';

  const CARD_TYPES = [
    { id: 1,  nom: "lave_3_verticale",   couleur: "#e74c3c" },
    { id: 2,  nom: "lave_3_horizontale", couleur: "#c0392b" },
    { id: 3,  nom: "lave_4",             couleur: "#a93226" },
    { id: 4,  nom: "eau_3_verticale",    couleur: "#3498db" },
    { id: 5,  nom: "eau_3_horizontale",  couleur: "#2980b9" },
    { id: 6,  nom: "eau_4",              couleur: "#1a6fa0" },
    { id: 7,  nom: "bloque_2",           couleur: "#7f8c8d" },
    { id: 8,  nom: "bloque_2empty",      couleur: "#95a5a6" },
    { id: 9,  nom: "vent_nord",          couleur: "#2ecc71" },
    { id: 10, nom: "vent_sud",           couleur: "#27ae60" },
    { id: 11, nom: "vent_est",           couleur: "#1e8449" },
    { id: 12, nom: "vent_west",          couleur: "#145a32" }
  ];

  /* ─── ÉTAT ─────────────────────────────────────────────── */
  let myName      = '';
  let myPlayfabId = '';
  let myHand      = [];
  let gameStarted = false;
  let lastCardUid = '';
  let pollTimer   = null;
  let stagedCard       = null;    // carte posée dans la zone de jeu
  let lastPlayedCardData = null;  // dernière carte jouée (ghost)
  let handElements = new Map(); // uid → élément DOM dans la main

  // Drag souris
  let draggedCard = null;
  let dragSource  = null;    // 'hand' | 'zone'
  let dropHandled = false;   // true si le drop a atterri quelque part

  // Drag tactile
  let touchDragCard    = null;
  let touchDragSource  = null;  // 'hand' | 'zone'
  let touchDragEl      = null;
  let touchDragStarted = false;
  let touchStartX      = 0;
  let touchStartY      = 0;

  /* ─── AUTO-RECONNEXION ──────────────────────────────────── */
  window.onload = async function () {
    initPlayZone();

    const savedName      = localStorage.getItem('playerName');
    const savedPlayfabId = localStorage.getItem('playfabId');

    if (savedName && savedPlayfabId) {
      try {
        const res  = await fetch(FUNCTION_URL);
        const data = await res.json();

        if (data.gameState !== 'waiting') {
          myName      = savedName;
          myPlayfabId = savedPlayfabId;
          hide('login-screen');
          hide('wait-screen');
          showGameMsg(`♻️ Reconnecté en tant que ${myName}`, '#4caf50');
          gameStarted = true;
          startGame(data);
          startPolling();
        } else {
          localStorage.removeItem('playerName');
          localStorage.removeItem('playfabId');
          document.getElementById('nameInput').value = savedName;
        }
      } catch (e) {
        if (savedName) document.getElementById('nameInput').value = savedName;
      }
    }
  };

  /* ─── REJOINDRE ─────────────────────────────────────────── */
  async function joinSession() {
    const name = document.getElementById('nameInput').value.trim();
    if (!name) { showLoginMsg('Entre ton nom !', '#e94560'); return; }
    myName = name;
    showLoginMsg('Connexion…', '#7b7a9a');

    try {
      const res  = await fetch(FUNCTION_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ playerName: name })
      });
      const data = await res.json();

      if (res.ok) {
        myPlayfabId = data.playfabId;
        localStorage.setItem('playerName', myName);
        localStorage.setItem('playfabId',  myPlayfabId);

        hide('login-screen');
        show('wait-screen');
        document.getElementById('player-count').textContent = data.count;
        startPolling();
      } else {
        showLoginMsg('Erreur : ' + JSON.stringify(data), '#e94560');
      }
    } catch (err) {
      showLoginMsg('Impossible de joindre le serveur', '#e94560');
    }
  }

  /* ─── POLLING ───────────────────────────────────────────── */
  function startPolling() {
    pollState();
    pollTimer = setInterval(pollState, 3000);
  }

  async function pollState() {
    try {
      const res  = await fetch(FUNCTION_URL);
      const data = await res.json();

      document.getElementById('player-count').textContent = data.count;

      if (data.gameState === 'started' && !gameStarted) {
        gameStarted = true;
        startGame(data);
      }

      if (data.gameState === 'waiting' && gameStarted) {
        localStorage.removeItem('playerName');
        localStorage.removeItem('playfabId');
        location.reload();
      }

      if (data.lastPlayedCard?.card) {
        const lp  = data.lastPlayedCard;
        const uid = lp.card.uid;
        if (uid !== lastCardUid) {
          lastCardUid = uid;
          lastPlayedCardData = lp.card;
          const el = document.getElementById('last-played');
          el.innerHTML = `
            <span class="played-dot" style="background:${lp.card.couleur}"></span>
            <b>${lp.playerName}</b> a joué <b>${lp.card.nom.replace(/_/g,' ')}</b>`;
        }
      }
    } catch (e) {}
  }

  /* ─── DÉBUT DE PARTIE ───────────────────────────────────── */
  function startGame(data) {
    hide('wait-screen');
    show('game-screen', 'flex');
    show('game-banner', 'flex');
    setTimeout(() => hide('game-banner'), 4000);

    const me = data.players?.find(p => p.playfabId === myPlayfabId);
    myHand = (me?.hand?.length) ? me.hand : drawLocalCards(5);
    renderPlayZone();
    renderHand();
  }

  /* Images manquantes → fallback sur le variant existant */
  const IMG_FALLBACKS = {
    'lave_3_horizontale': 'lave_3_verticale',
    'eau_3_horizontale':  'eau_3_verticale',
  };

  /* ─── CONSTRUIRE UN ÉLÉMENT CARTE ───────────────────────── */
  function buildCardElement(card) {
    const div = document.createElement('div');
    div.className = 'card';
    div.style.background = card.couleur;

    const imgNom = IMG_FALLBACKS[card.nom] ?? card.nom;
    const img = document.createElement('img');
    img.className = 'card-img';
    img.src = `${MEDIAS_PATH}${imgNom}${IMG_EXT}`;
    img.alt = card.nom;
    img.draggable = false;
    img.onerror = () => { img.style.display = 'none'; };

    const overlay = document.createElement('div');
    overlay.className = 'card-overlay';

    const idEl = document.createElement('div');
    idEl.className = 'card-id';
    idEl.textContent = card.id;

    const dot = document.createElement('div');
    dot.className = 'card-dot';
    dot.style.background = card.couleur;

    const nameEl = document.createElement('div');
    nameEl.className = 'card-name';
    nameEl.textContent = card.nom.replace(/_/g, ' ');

    div.appendChild(img);
    div.appendChild(overlay);
    div.appendChild(idEl);
    div.appendChild(dot);
    div.appendChild(nameEl);
    return div;
  }

  /* ─── SÉLECTIONNER UNE CARTE (clic ou drop) ─────────────── */
  function stageCard(card) {
    const prev = stagedCard;
    stagedCard = card;
    renderPlayZone();

    // Restaure l'ancienne carte dans la main (si différente)
    if (prev && prev.uid !== card.uid) {
      const el = handElements.get(prev.uid);
      if (el) el.classList.remove('hand-hidden');
    }
    // Collapse la nouvelle carte sélectionnée
    const el = handElements.get(card.uid);
    if (el) el.classList.add('hand-hidden');
  }

  function cancelStage() {
    const prev = stagedCard;
    stagedCard = null;
    renderPlayZone();

    // Réouvre le slot de la carte dans la main
    if (prev) {
      const el = handElements.get(prev.uid);
      if (el) el.classList.remove('hand-hidden');
    }
  }

  /* ─── HELPER TOUCH DRAG : clone qui suit le doigt ───────── */
  function getHandCardSize() {
    const sample = document.querySelector('#hand .card:not(.hand-hidden):not(.dragging)');
    return sample ? sample.offsetWidth : 90;
  }

  function startTouchClone(sourceDiv, forceSize) {
    const rect = sourceDiv.getBoundingClientRect();
    const size = forceSize ?? rect.width;
    touchDragEl = sourceDiv.cloneNode(true);
    touchDragEl.style.cssText = [
      'position:fixed',
      `width:${size}px`,
      `height:${size}px`,
      'opacity:0.92',
      'z-index:1000',
      'pointer-events:none',
      'transform:scale(1.1) rotate(-3deg)',
      'transform-origin:center center',
      `border-radius:${getComputedStyle(sourceDiv).borderRadius}`,
      `left:${rect.left + rect.width / 2 - size / 2}px`,
      `top:${rect.top  + rect.height / 2 - size / 2}px`,
      'transition:none',
      'box-shadow:0 24px 50px rgba(0,0,0,0.7)',
    ].join(';');
    document.body.appendChild(touchDragEl);
  }

  function moveTouchClone(clientX, clientY) {
    if (!touchDragEl) return;
    const w = parseFloat(touchDragEl.style.width);
    const h = parseFloat(touchDragEl.style.height);
    touchDragEl.style.left = (clientX - w / 2) + 'px';
    touchDragEl.style.top  = (clientY - h * 0.65) + 'px';
  }

  function removeTouchClone() {
    if (touchDragEl) { document.body.removeChild(touchDragEl); touchDragEl = null; }
  }

  function isOverZone(clientX, clientY) {
    const zr = document.getElementById('play-zone').getBoundingClientRect();
    return clientX >= zr.left && clientX <= zr.right &&
           clientY >= zr.top  && clientY <= zr.bottom;
  }

  /* ─── AFFICHER LA MAIN ──────────────────────────────────── */
  function renderHand() {
    const handDiv = document.getElementById('hand');
    handDiv.innerHTML = '';
    handElements.clear();

    myHand.slice().sort((a, b) => a.id - b.id).forEach((card, i) => {
      const div = buildCardElement(card);
      div.style.animationDelay = `${i * 0.06}s`;
      div.draggable = true;

      // Si cette carte est déjà sélectionnée, on la cache sans animation
      if (stagedCard && stagedCard.uid === card.uid) {
        div.classList.add('hand-hidden');
        div.style.animation = 'none';
      }

      /* ── CLIC → stage direct ── */
      div.addEventListener('click', () => stageCard(card));

      /* ── DRAG SOURIS ── */
      div.addEventListener('dragstart', (e) => {
        draggedCard = card;
        dragSource  = 'hand';
        dropHandled = false;
        e.dataTransfer.setDragImage(div, div.offsetWidth / 2, div.offsetHeight / 2);
        e.dataTransfer.effectAllowed = 'move';
        requestAnimationFrame(() => div.classList.add('dragging'));
      });
      div.addEventListener('dragend', () => {
        div.classList.remove('dragging');
        draggedCard = null;
        dragSource  = null;
        dropHandled = false;
      });

      /* ── DRAG TACTILE ── */
      div.addEventListener('touchstart', (e) => {
        const t = e.touches[0];
        touchStartX      = t.clientX;
        touchStartY      = t.clientY;
        touchDragStarted = false;
        touchDragCard    = card;
        touchDragSource  = 'hand';
        div.classList.add('lifting');   // soulève visuellement dès le toucher
      }, { passive: true });

      div.addEventListener('touchmove', (e) => {
        if (!touchDragCard) return;
        const t    = e.touches[0];
        const dist = Math.hypot(t.clientX - touchStartX, t.clientY - touchStartY);

        if (!touchDragStarted && dist > 10) {
          touchDragStarted = true;
          div.classList.remove('lifting');
          startTouchClone(div);
          div.classList.add('dragging');
        }
        if (touchDragStarted) {
          e.preventDefault();
          moveTouchClone(t.clientX, t.clientY);
          document.getElementById('play-zone').classList.toggle('drag-over', isOverZone(t.clientX, t.clientY));
        }
      }, { passive: false });

      div.addEventListener('touchend', (e) => {
        div.classList.remove('lifting');
        if (!touchDragStarted) {
          // Simple tap → stage the card
          touchDragCard = null; touchDragSource = null; return;
        }
        const t = e.changedTouches[0];
        removeTouchClone();
        div.classList.remove('dragging');
        document.getElementById('play-zone').classList.remove('drag-over');

        if (isOverZone(t.clientX, t.clientY)) stageCard(touchDragCard);

        touchDragCard    = null;
        touchDragSource  = null;
        touchDragStarted = false;
      }, { passive: true });

      handElements.set(card.uid, div);
      handDiv.appendChild(div);
    });
  }

  /* ─── ZONE DE DÉPÔT ─────────────────────────────────────── */
  function initPlayZone() {
    const zone     = document.getElementById('play-zone');
    const handArea = document.querySelector('.hand-area');

    // Créer l'overlay d'effets élémentaires (persistant)
    const fx = document.createElement('div');
    fx.id = 'zone-fx';
    zone.appendChild(fx);

    /* Zone centrale : accepte les cartes de la main */
    zone.addEventListener('dragover', (e) => {
      if (dragSource === 'hand') {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        zone.classList.add('drag-over');
      }
    });
    zone.addEventListener('dragleave', (e) => {
      if (!zone.contains(e.relatedTarget)) zone.classList.remove('drag-over');
    });
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      if (dragSource === 'hand' && draggedCard) {
        dropHandled = true;
        stageCard(draggedCard);
      }
    });

    /* Zone basse (main) : accepte la carte posée pour l'annuler */
    handArea.addEventListener('dragover', (e) => {
      if (dragSource === 'zone') { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
    });
    handArea.addEventListener('drop', (e) => {
      e.preventDefault();
      if (dragSource === 'zone') { dropHandled = true; cancelStage(); }
    });
  }

  function renderPlayZone() {
    const zone = document.getElementById('play-zone');
    const btn  = document.getElementById('confirm-btn');
    const fx   = document.getElementById('zone-fx'); // préserver avant de vider

    if (!stagedCard) {
      zone.innerHTML = '';
      if (fx) {
        fx.className = '';
        zone.classList.remove('zone-shake');
        zone.appendChild(fx);
      }
      if (lastPlayedCardData) {
        const imgNom = IMG_FALLBACKS[lastPlayedCardData.nom] ?? lastPlayedCardData.nom;
        const ghostImg = document.createElement('img');
        ghostImg.className = 'zone-ghost-img';
        ghostImg.src = `${MEDIAS_PATH}${imgNom}${IMG_EXT}`;
        ghostImg.alt = '';
        ghostImg.onerror = () => { ghostImg.style.display = 'none'; };
        zone.appendChild(ghostImg);
        const ghostOverlay = document.createElement('div');
        ghostOverlay.className = 'zone-ghost-overlay';
        ghostOverlay.style.background = lastPlayedCardData.couleur;
        zone.appendChild(ghostOverlay);
      }
      const hint = document.createElement('div');
      hint.className = 'zone-hint';
      hint.innerHTML = 'Glisse ou clique une carte<br>pour la sélectionner';
      zone.appendChild(hint);
      zone.classList.remove('has-card');
      btn.style.visibility = 'hidden';
      btn.style.pointerEvents = 'none';
      return;
    }

    zone.classList.add('has-card');
    zone.innerHTML = '';
    if (fx) zone.appendChild(fx);
    const div = buildCardElement(stagedCard);
    div.classList.add('staged');
    div.draggable = true;

    /* ── Face arrière ── */
    const backFace = document.createElement('div');
    backFace.className = 'card-back-face';
    const backImg = document.createElement('img');
    backImg.src = `${MEDIAS_PATH}DosCartesCouleur${IMG_EXT}`;
    backImg.alt = 'dos';
    backFace.appendChild(backImg);
    div.appendChild(backFace);

    /* Clic → annuler sauf si swipe horizontal */
    let wasSwiping = false;
    div.addEventListener('click', () => { if (!wasSwiping) cancelStage(); });

    /* ── DRAG SOURIS depuis la zone → vers la main ── */
    div.addEventListener('dragstart', (e) => {
      draggedCard = stagedCard;
      dragSource  = 'zone';
      dropHandled = false;
      const s = getHandCardSize();
      const ghost = div.cloneNode(true);
      ghost.style.cssText = `position:fixed;width:${s}px;height:${s}px;top:-9999px;left:-9999px;border-radius:14px;overflow:hidden;pointer-events:none;`;
      document.body.appendChild(ghost);
      e.dataTransfer.setDragImage(ghost, s / 2, s / 2);
      requestAnimationFrame(() => document.body.removeChild(ghost));
      e.dataTransfer.effectAllowed = 'move';
      zone.classList.add('drag-out');
    });
    div.addEventListener('dragend', () => {
      zone.classList.remove('drag-out');
      if (!dropHandled) cancelStage();
      draggedCard = null;
      dragSource  = null;
      dropHandled = false;
    });

    /* ── SWIPE HORIZONTAL → spin / SWIPE VERTICAL → drag ── */
    let spinAngle    = 0;
    let spinMode     = null;   // null | 'spin' | 'drag'
    let spinLastX    = 0;
    let spinLastTime = 0;
    let spinVelocity = 0;
    let cancelSpin   = null;

    div.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      touchStartX = spinLastX = t.clientX;
      touchStartY = t.clientY;
      spinLastTime = Date.now();
      spinVelocity = 0;
      spinMode     = null;
      wasSwiping   = false;
      touchDragStarted = false;
      touchDragCard    = stagedCard;
      touchDragSource  = 'zone';
      if (cancelSpin) { cancelSpin(); cancelSpin = null; }
    }, { passive: true });

    div.addEventListener('touchmove', (e) => {
      e.preventDefault(); // bloque scroll/navigation iOS dès le début
      const t  = e.touches[0];
      const dx = t.clientX - touchStartX;
      const dy = t.clientY - touchStartY;

      if (spinMode === null && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
        spinMode = Math.abs(dx) >= Math.abs(dy) ? 'spin' : 'drag';
      }

      if (spinMode === 'spin') {
        wasSwiping = true;
        const now  = Date.now();
        const dt   = now - spinLastTime || 1;
        const move = t.clientX - spinLastX;
        spinVelocity = move / dt;
        spinAngle   += move * 0.55;
        div.style.transform = `rotateY(${spinAngle}deg)`;
        spinLastX    = t.clientX;
        spinLastTime = now;

      } else if (spinMode === 'drag') {
        const dist = Math.hypot(dx, dy);
        if (!touchDragStarted && dist > 10) {
          touchDragStarted = true;
          startTouchClone(div, getHandCardSize());
          zone.classList.add('drag-out');
        }
        if (touchDragStarted) {
          e.preventDefault();
          moveTouchClone(t.clientX, t.clientY);
          zone.classList.toggle('drag-over', isOverZone(t.clientX, t.clientY));
        }
      }
    }, { passive: false });

    div.addEventListener('touchend', (e) => {
      if (spinMode === 'spin') {
        // Inertie : momentum proportionnel à la vélocité
        const momentum = spinVelocity * 220;
        const raw      = spinAngle + momentum;
        const snapped  = Math.round(raw / 180) * 180;
        const from     = spinAngle;
        cancelSpin = animateSpinTo(div, from, snapped, () => { spinAngle = snapped; cancelSpin = null; });

      } else if (spinMode === 'drag' && touchDragStarted) {
        const t = e.changedTouches[0];
        removeTouchClone();
        zone.classList.remove('drag-out', 'drag-over');
        if (!isOverZone(t.clientX, t.clientY)) cancelStage();
      }
      touchDragCard    = null;
      touchDragSource  = null;
      touchDragStarted = false;
      spinMode         = null;
    }, { passive: true });

    zone.appendChild(div);
    btn.style.visibility = 'visible';
    btn.style.pointerEvents = '';
    triggerZoneFx(stagedCard);
  }

  /* ─── EFFETS ÉLÉMENTAIRES ───────────────────────────────── */
  function triggerZoneFx(card) {
    const fx   = document.getElementById('zone-fx');
    const zone = document.getElementById('play-zone');
    if (!fx) return;

    // Réinitialiser les animations précédentes
    fx.className = '';
    zone.classList.remove('zone-shake');
    void fx.offsetWidth; // force reflow pour relancer les keyframes

    const nom = card.nom;
    if      (nom.startsWith('lave'))   { fx.className = 'fx-lava'; }
    else if (nom.startsWith('eau'))    { fx.className = 'fx-eau'; }
    else if (nom.startsWith('bloque')) {
      fx.className = 'fx-bloque';
      zone.classList.add('zone-shake');
      setTimeout(() => zone.classList.remove('zone-shake'), 600);
    }
    else if (nom.startsWith('vent'))   { fx.className = 'fx-vent'; }
  }

  /* ─── SPIN INERTIE ──────────────────────────────────────── */
  function animateSpinTo(el, from, to, onDone) {
    const dist    = Math.abs(to - from);
    const duration = Math.min(700, dist * 2.8 + 150);
    const start   = performance.now();
    let raf;
    function step(now) {
      const t      = Math.min((now - start) / duration, 1);
      const eased  = 1 - Math.pow(1 - t, 3);
      el.style.transform = `rotateY(${from + (to - from) * eased}deg)`;
      if (t < 1) { raf = requestAnimationFrame(step); }
      else        { if (onDone) onDone(); }
    }
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }

  /* ─── JOUER LA CARTE ────────────────────────────────────── */
  async function confirmPlay() {
    if (!stagedCard) return;
    const card = stagedCard;

    // Animation de sortie avant d'envoyer
    const stagedEl = document.querySelector('#play-zone .card.staged');
    if (stagedEl) {
      stagedEl.classList.add('playing-out');
      await new Promise(r => setTimeout(r, 380));
    }

    stagedCard = null;
    renderPlayZone();

    const btn = document.getElementById('confirm-btn');
    btn.disabled    = true;
    btn.textContent = 'Envoi…';

    try {
      const res  = await fetch(FUNCTION_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ action: 'playCard', cardUid: card.uid, playfabId: myPlayfabId })
      });
      const data = await res.json();

      btn.disabled    = false;
      btn.textContent = 'Jouer la carte';

      if (res.ok) {
        myHand = data.hand;
        lastPlayedCardData = card;
        renderHand();
        showGameMsg(`✅ ${data.playedCard.nom.replace(/_/g,' ')} jouée !`, '#4caf50');
        setTimeout(() => showGameMsg('', ''), 2200);
      } else {
        stagedCard = card;
        renderPlayZone();
        renderHand();
        showGameMsg('Erreur : ' + JSON.stringify(data), '#e94560');
      }
    } catch (err) {
      btn.disabled    = false;
      btn.textContent = 'Jouer la carte';
      stagedCard = card;
      renderPlayZone();
      renderHand();
      showGameMsg('Erreur réseau', '#e94560');
    }
  }

  /* ─── TIRAGE LOCAL (fallback) ───────────────────────────── */
  function drawLocalCards(count) {
    return Array.from({ length: count }, () => {
      const card = CARD_TYPES[Math.floor(Math.random() * CARD_TYPES.length)];
      return { ...card, uid: Math.random().toString(36).substr(2, 9) };
    });
  }

  /* ─── HELPERS UI ────────────────────────────────────────── */
  function show(id, display = 'block') {
    const el = document.getElementById(id);
    if (el) el.style.display = display;
  }
  function hide(id) {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  }
  function showLoginMsg(msg, color) {
    const el = document.getElementById('login-msg');
    if (el) { el.textContent = msg; el.style.color = color; }
  }
  function showGameMsg(msg, color) {
    const el = document.getElementById('game-msg');
    if (el) { el.textContent = msg; el.style.color = color; }
  }
</script>
</body>
</html>
